<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Euromonitor — Industry Calendar FY 26–27</title>
<style>

:root{
  --ming:#34657F;--ming-dk:#274e62;--ming-bg:rgba(52,101,127,.1);
  --pump:#FF6A13;--pump-bg:#fff3ec;
  --shaft:#2d3a42;--surface:#f3f6f8;--border:#dce5ea;--muted:#7a93a3;
  --font:-apple-system,'Segoe UI',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{margin:0;padding:0}
body{
  width:100%;height:100vh;min-height:600px;
  display:flex;flex-direction:column;overflow:hidden;
  font-family:var(--font);background:var(--surface);color:var(--shaft);
}



/* Toolbar */
/* View toggle row in toolbar */
.vrow{padding:6px 0 8px;display:flex;align-items:center;justify-content:space-between}
.view-toggle{display:flex;background:rgba(255,255,255,.12);border-radius:20px;padding:2px;gap:2px}
.vtbtn{padding:4px 14px;border-radius:18px;font-size:.7rem;font-weight:600;border:none;background:none;color:rgba(255,255,255,.65);cursor:pointer;transition:all .15s}
.vtbtn:hover{color:#fff}
.vtbtn.active{background:#fff;color:var(--ming-dk);font-weight:700}
.hdr-meta{font-size:.68rem;color:rgba(255,255,255,.45)}
.hdr-meta strong{color:rgba(255,255,255,.75)}

.toolbar{background:var(--ming);padding:0 18px;flex-shrink:0}
.month-strip{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid rgba(255,255,255,.1)}
.month-strip::-webkit-scrollbar{display:none}
.mbtn{padding:10px 14px;font-size:.72rem;font-weight:500;color:rgba(255,255,255,.5);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .15s}
.mbtn:hover{color:#fff}
.mbtn.active{color:#fff;border-bottom-color:var(--pump);font-weight:700}
.orow{padding:8px 0;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.flabel{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-right:2px}
.ochip{padding:3px 11px;border-radius:20px;font-size:.67rem;font-weight:500;cursor:pointer;color:rgba(255,255,255,.62);background:rgba(255,255,255,.08);display:flex;align-items:center;gap:5px;transition:all .14s;white-space:nowrap;border:none}
.ochip:hover{background:rgba(255,255,255,.15);color:#fff}
.ochip.active{background:#fff;color:var(--ming-dk);font-weight:700}
.ochip .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Day nav */
.dnav{background:#fff;border-bottom:1px solid var(--border);padding:0 18px;display:flex;align-items:center;flex-shrink:0;box-shadow:0 1px 5px rgba(52,101,127,.06)}
.narr{width:30px;height:30px;border:none;background:none;cursor:pointer;font-size:1.25rem;color:var(--muted);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.narr:hover{background:var(--ming-bg);color:var(--ming)}
.dscroll{flex:1;overflow-x:auto;scrollbar-width:none}
.dscroll::-webkit-scrollbar{display:none}
.dstrip{display:flex}
.dpill{padding:7px 9px;display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;border-bottom:3px solid transparent;transition:all .13s;min-width:46px}
.dpill:hover{background:var(--surface)}
.dpill.active{border-bottom-color:var(--pump)}
.dpill-wd{font-size:.56rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.dpill-num{font-size:.92rem;font-weight:700;color:var(--shaft);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.dpill.active .dpill-num{background:var(--pump);color:#fff}
.dpill.is-today .dpill-num{background:var(--ming-bg);color:var(--ming)}
.dpill.active.is-today .dpill-num{background:var(--pump);color:#fff}
.dpill-dots{display:flex;gap:2px;height:4px;margin-top:1px}
.dpip{width:4px;height:4px;border-radius:50%}
.today-btn{padding:4px 12px;border-radius:20px;font-size:.68rem;font-weight:600;border:1.5px solid var(--border);background:#fff;color:var(--shaft);cursor:pointer;transition:all .13s;margin-left:7px;flex-shrink:0}
.today-btn:hover{border-color:var(--ming);color:var(--ming)}

/* Stats bar */
.sbar{background:#fff;border-bottom:1px solid var(--border);padding:5px 18px;display:flex;gap:18px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.sstat{display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--muted)}
.sstat .pip{width:6px;height:6px;border-radius:50%}
.sstat strong{color:var(--shaft);font-weight:700}

/* Day body */
.dbody{display:flex;flex:1;overflow:hidden;min-height:0;height:0}
.dhero{width:172px;flex-shrink:0;background:var(--ming-dk);padding:22px 14px;display:flex;flex-direction:column;align-items:center;gap:3px;overflow-y:auto}
.dh-wd{font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.38)}
.dh-day{font-size:3.4rem;font-weight:800;color:#fff;line-height:1}
.dh-mo{font-size:1rem;font-weight:600;color:rgba(255,255,255,.52)}
.dh-yr{font-size:.68rem;color:rgba(255,255,255,.28);font-weight:500}
.dh-div{width:26px;height:2px;background:var(--pump);border-radius:2px;margin:9px 0 5px}
.dh-n strong{font-size:1.35rem;font-weight:800;color:var(--pump);display:block;text-align:center;line-height:1}
.dh-n{font-size:.68rem;color:rgba(255,255,255,.38);text-align:center;line-height:1.6}

/* Day event scroll */
.escroll{flex:1;overflow-y:auto;min-height:0;padding:14px 18px;display:flex;flex-direction:column;gap:9px}

/* ── MONTH VIEW ── */
#month-view{display:none;flex:1;overflow:hidden;flex-direction:column}
.mv-nav{background:#fff;border-bottom:1px solid var(--border);padding:8px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.mv-title{font-size:1.1rem;font-weight:800;color:var(--shaft);flex:1}
.mv-count{font-size:.72rem;font-weight:600;background:var(--pump);color:#fff;padding:3px 11px;border-radius:20px}
.mv-scroll{flex:1;overflow-y:auto;min-height:0}
.mv-grid{display:grid;grid-template-columns:repeat(7,1fr);min-width:600px}
.mv-head-cell{background:var(--ming-dk);padding:8px 4px;text-align:center;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.65)}
.mv-cell{min-height:100px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:5px 4px;background:#fff;position:relative;cursor:pointer;transition:background .12s}
.mv-cell:hover{background:#f8fafb}
.mv-cell.other-month{background:#fafbfc}
.mv-cell.other-month .mv-day-num{color:#c5d0d8}
.mv-cell.is-today{background:#fffbf5}
.mv-cell.is-today .mv-day-num{background:var(--pump);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.mv-cell:nth-child(7n){border-right:none}
.mv-day-num{font-size:.78rem;font-weight:700;color:var(--shaft);width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin-bottom:3px}
.mv-chip{display:block;padding:2px 5px;border-radius:4px;font-size:.6rem;font-weight:600;color:#fff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:opacity .12s}
.mv-chip:hover{opacity:.82}
.mv-more{font-size:.58rem;color:var(--muted);font-weight:600;padding:1px 4px;cursor:pointer}
.mv-more:hover{color:var(--ming)}

/* TBD panel */
#tbd-view{display:none;flex:1;overflow:hidden;flex-direction:column}
.tbd-header{background:#fff;border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tbd-title{font-size:.88rem;font-weight:700;color:var(--shaft)}
.tbd-sub{font-size:.72rem;color:var(--muted)}
.tbd-search{padding:6px 12px;border:1.5px solid var(--border);border-radius:20px;font-size:.75rem;font-family:var(--font);outline:none;width:200px;transition:border-color .15s}
.tbd-search:focus{border-color:var(--ming)}
.tbd-grid{flex:1;overflow-y:auto;min-height:0;padding:14px 18px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:9px;align-content:start}

/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--muted);text-align:center;padding:40px}
.empty .ei{font-size:2.5rem;opacity:.25}
.empty h3{font-size:.95rem;font-weight:700;color:var(--shaft);opacity:.4}
.empty p{font-size:.74rem;opacity:.6;max-width:260px;line-height:1.6}

/* Event card */
.ecard{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;gap:10px;cursor:pointer;transition:box-shadow .15s,transform .15s,border-color .15s}
.ecard:hover{box-shadow:0 4px 14px rgba(52,101,127,.12);transform:translateY(-1px);border-color:var(--ming)}
.ebar{width:4px;border-radius:4px;flex-shrink:0;align-self:stretch;min-height:32px}
.ebody{flex:1;min-width:0}
.etop{display:flex;align-items:flex-start;justify-content:space-between;gap:7px;margin-bottom:5px}
.ename{font-weight:700;font-size:.84rem;color:var(--shaft);line-height:1.3}
.ebadge{flex-shrink:0;font-size:.58rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:20px;white-space:nowrap}
.emeta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.emi{display:flex;align-items:center;gap:3px;font-size:.7rem;color:var(--muted)}
.emi b{color:var(--shaft);font-weight:600}
.efoot{display:flex;align-items:center;justify-content:space-between;padding-top:6px;border-top:1px solid var(--border);flex-wrap:wrap;gap:5px}
.epoc{background:var(--ming-bg);color:var(--ming);font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:20px}
.etopic{font-size:.64rem;color:var(--muted);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.emore{font-size:.64rem;color:var(--pump);font-weight:700;flex-shrink:0}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(20,40,55,.48);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .18s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:14px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 55px rgba(0,0,0,.2);transform:translateY(14px) scale(.97);transition:transform .2s cubic-bezier(.22,1,.36,1)}
.overlay.open .modal{transform:none}
.mhead{padding:18px 18px 13px;border-bottom:1px solid var(--border);position:relative}
.mbar{height:4px;border-radius:2px;margin-bottom:11px}
.mbadge-m{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:20px;display:inline-block;margin-bottom:6px}
.mtitle{font-size:1.1rem;font-weight:800;color:var(--shaft);line-height:1.3;padding-right:32px}
.mx{position:absolute;top:15px;right:15px;width:27px;height:27px;border:1.5px solid var(--border);border-radius:7px;background:none;cursor:pointer;font-size:1rem;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .12s}
.mx:hover{border-color:var(--shaft);color:var(--shaft)}
.mbody{padding:16px 18px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.mf label{font-size:.57rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:3px}
.mf p{font-size:.8rem;font-weight:500;color:var(--shaft);line-height:1.4}
.mf.full{grid-column:1/-1}
.mbox{border-radius:7px;padding:10px 13px;font-size:.78rem;line-height:1.6;margin-bottom:10px}
.mbox.topic{background:var(--surface);border-left:3px solid var(--pump);color:var(--shaft);font-style:italic}
.mbox.comments{background:#fffdf5;border-left:3px solid #f59e0b;color:var(--shaft)}
.mlink{display:inline-flex;align-items:center;gap:6px;background:var(--ming);color:#fff;padding:8px 16px;border-radius:8px;text-decoration:none;font-size:.76rem;font-weight:700;transition:background .14s;margin-top:4px}
.mlink:hover{background:var(--ming-dk)}
.mtag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.mtag{font-size:.62rem;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--surface);color:var(--muted)}
.mtag.green{background:#ecfdf5;color:#065f46}
.mtag.blue{background:var(--ming-bg);color:var(--ming)}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:600px){.dhero{width:86px;padding:14px 8px}.dh-day{font-size:2.2rem}.dh-wd,.dh-yr{display:none}.mgrid{grid-template-columns:1fr}.tbd-search{width:130px}}

</style>
</head>

</div>

<!-- TBD VIEW -->

  </div>
  <div class="tbd-grid" id="tbd-grid"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal-inner"></div>
</div>
<div class="overlay" id="overlay">
  <div class="modal" id="modal-inner"></div>
</div>

<script>
/* ── CONFIG ──────────────────────────────────────────────
   When your SharePoint list is ready, swap the hardcoded
   data for a live fetch by uncommenting the lines below
   and removing the ALL_EVENTS_RAW assignment above.

   const SP_SITE_URL  = 'https://YOUR_TENANT.sharepoint.com/sites/YOUR_SITE';
   const SP_LIST_NAME = 'Events_FY26_27_Combined';
   const COLS = {
     title:'Title', date:'EventDate', location:'Country',
     office:'Office City', type:'Attending or Presenting?',
     poc:'Event Executive', industry:'Industry', sector:'Sector',
     status:'Status', topic:'Presentation Topic',
     link:'Link to Event', comments:'Comments',
     speakers:'Research Speakers', top20:'Top 20 Presence?',
     region:'Region',
   };
   async function loadEvents(){
     const sel = Object.values(COLS).join(',');
     const url = `${SP_SITE_URL}/_api/web/lists/getbytitle('${SP_LIST_NAME}')/items?$select=${sel}&$top=5000&$orderby=${COLS.date}+asc`;
     const r = await fetch(url,{headers:{'Accept':'application/json;odata=nometadata'},credentials:'include'});
     if(!r.ok) throw new Error(r.status+' '+r.statusText);
     const j = await r.json();
     return j.value.map(row=>({
       name:(row[COLS.title]||'').trim(),
       date:parseDate(row[COLS.date]),
       location:(row[COLS.location]||'').trim(),
       office:(row[COLS.office]||'').trim(),
       type:(row[COLS.type]||'').trim(),
       poc:(row[COLS.poc]||'').trim(),
       industry:(row[COLS.industry]||'').trim(),
       sector:(row[COLS.sector]||'').trim(),
       status:(row[COLS.status]||'').trim(),
       topic:(row[COLS.topic]||'').trim(),
       link:(row[COLS.link]||'').trim(),
       comments:(row[COLS.comments]||'').trim(),
       speakers:(row[COLS.speakers]||'').trim(),
       top20:(row[COLS.top20]||'').trim(),
       region:(row[COLS.region]||'').trim(),
     })).filter(e=>e.name);
   }
   function parseDate(raw){
     if(!raw) return '';
     const d=new Date(raw);
     return isNaN(d)?'':`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
   }
──────────────────────────────────────────────────────── */

// ── COLOURS ──
const OFF_COL={'chicago':'#2563eb','london':'#7c3aed','sao paulo':'#059669','mexico city':'#d97706','santiago':'#0891b2','dubai':'#dc2626','cape town':'#be185d','düsseldorf':'#6d28d9','dusseldorf':'#6d28d9','vilnius':'#065f46','bengaluru':'#b45309','shanghai':'#1d4ed8','singapore':'#0f766e','tokyo':'#9333ea','seoul':'#c2410c','other':'#6b7280'};
function offColor(n){if(!n)return'#34657F';const k=n.toLowerCase().trim();for(const[key,v]of Object.entries(OFF_COL))if(k===key||k.includes(key))return v;return'#34657F';}
function typeColor(t){const k=(t||'').toLowerCase();if(k.includes('present')||k.includes('speaking'))return'#FF6A13';if(k.includes('attending')||k.includes('both'))return'#34657F';if(k.includes('pitch'))return'#d97706';if(k.includes('partner'))return'#059669';return'#7a93a3';}
function typeLabel(t){const k=(t||'').toLowerCase();if(k.includes('present')||k.includes('speaking'))return'Presenting';if(k==='both')return'Both';if(k.includes('attend'))return'Attending';if(k.includes('pitch'))return'Pitching';if(k.includes('partner'))return'Partnership';if(k==='tbd')return'TBD';return t||'Event';}

// ── STATE ──
let ALL_EVENTS=[],ALL_OFFICES=[],selectedOffice='all',currentView='day';
const realToday=new Date();
let currentDate=new Date(realToday);
let weekStart=mondayOf(new Date(realToday));

const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const ML=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DL=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function mondayOf(d){const r=new Date(d);const dy=r.getDay();r.setDate(r.getDate()-(dy===0?6:dy-1));return r;}
function iso(d){return(d instanceof Date?d:new Date(d)).toISOString().slice(0,10);}

// ── BOOT ──
(function(){
  ALL_EVENTS=(window.EM_A||[]).concat(window.EM_B||[]);
  const offSet=new Set(ALL_EVENTS.map(e=>e.office).filter(Boolean));
  ALL_OFFICES=[{id:'all',label:'All Offices',color:'#34657F'}];
  [...offSet].sort().forEach(o=>ALL_OFFICES.push({id:o,label:o,color:offColor(o)}));

  // jump to first upcoming dated event
  const today=iso(realToday);
  const upcoming=ALL_EVENTS.filter(e=>e.date).find(e=>e.date>=today);
  if(upcoming){currentDate=new Date(upcoming.date+'T12:00:00');weekStart=mondayOf(new Date(currentDate));}

  const dated=ALL_EVENTS.filter(e=>e.date).length;
  const tbd=ALL_EVENTS.length-dated;
  document.getElementById('hdr-meta').innerHTML=`<strong>${dated}</strong> dated · <strong>${tbd}</strong> TBD`;
  document.getElementById('tbd-count').textContent=tbd;
  renderAll();
})();

// ── FILTERS ──
function filtered(){return selectedOffice==='all'?ALL_EVENTS:ALL_EVENTS.filter(e=>e.office===selectedOffice);}
function datedFiltered(){return filtered().filter(e=>e.date);}
function tbdFiltered(){return filtered().filter(e=>!e.date);}
function eventsOn(d){const ds=iso(d);return datedFiltered().filter(e=>e.date===ds);}
function hasDayEvt(d){const ds=iso(d);return datedFiltered().some(e=>e.date===ds);}
function getMonths(){
  const seen=new Set();
  datedFiltered().forEach(e=>{const d=new Date(e.date+'T12:00:00');seen.add(d.getFullYear()+'-'+String(d.getMonth()).padStart(2,'0'));});
  return[...seen].sort().map(s=>{const[y,m]=s.split('-').map(Number);return{y,m};});
}

// ── VIEW TOGGLE ──
function setView(v){
  currentView=v;
  document.getElementById('vt-day').classList.toggle('active',v==='day');
  document.getElementById('vt-month').classList.toggle('active',v==='month');
  document.getElementById('vt-tbd').classList.toggle('active',v==='tbd');
  document.getElementById('day-nav').style.display=v==='day'?'flex':'none';
  document.getElementById('day-view').style.display=v==='day'?'flex':'none';
  document.getElementById('month-view').style.display=v==='month'?'flex':'none';
  document.getElementById('tbd-view').style.display=v==='tbd'?'flex':'none';
  if(v==='tbd') renderTbd();
  if(v==='month') renderMonth();
}

// ── RENDER ──
function renderMonthStrip(){
  const strip=document.getElementById('month-strip');strip.innerHTML='';
  const months=getMonths();if(!months.length)return;
  const cy=currentDate.getFullYear(),cm=currentDate.getMonth();
  months.forEach(({y,m})=>{
    const btn=document.createElement('button');
    btn.className='mbtn'+(y===cy&&m===cm?' active':'');
    btn.textContent=MS[m]+(y!==months[0].y?' \''+String(y).slice(2):'');
    btn.onclick=()=>{
      const first=datedFiltered().find(e=>{const d=new Date(e.date+'T12:00:00');return d.getFullYear()===y&&d.getMonth()===m;});
      currentDate=first?new Date(first.date+'T12:00:00'):new Date(y,m,1);
      weekStart=mondayOf(new Date(currentDate));
      if(currentView==='tbd')setView('day');
      renderAll();
      if(currentView==='month')renderMonth();
    };
    strip.appendChild(btn);
  });
  strip.querySelector('.active')?.scrollIntoView({block:'nearest',inline:'center'});
}

function renderOfficeRow(){
  const row=document.getElementById('office-row');row.innerHTML='<span class="flabel">Office</span>';
  ALL_OFFICES.forEach(o=>{
    const btn=document.createElement('button');
    btn.className='ochip'+(selectedOffice===o.id?' active':'');
    btn.innerHTML=`<span class="dot" style="background:${o.color}"></span>${o.label}`;
    btn.onclick=()=>{selectedOffice=o.id;renderAll();};
    row.appendChild(btn);
  });
}

function renderStats(){
  const fe=datedFiltered(),todayEvts=eventsOn(currentDate),tbd=tbdFiltered();
  document.getElementById('stats-bar').innerHTML=`
    <div class="sstat"><span class="pip" style="background:#34657F"></span><strong>${fe.length}</strong>&nbsp;dated events</div>
    <div class="sstat"><span class="pip" style="background:#FF6A13"></span><strong>${todayEvts.length}</strong>&nbsp;on selected day</div>
    <div class="sstat"><span class="pip" style="background:#d97706"></span><strong>${tbd.length}</strong>&nbsp;TBD dates</div>
    <div class="sstat"><span class="pip" style="background:#059669"></span><strong>${ALL_OFFICES.length-1}</strong>&nbsp;offices</div>`;
}

function renderDayStrip(){
  const strip=document.getElementById('day-strip');strip.innerHTML='';
  for(let i=0;i<14;i++){
    const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);
    const isActive=iso(d)===iso(currentDate);
    const isToday2=d.toDateString()===realToday.toDateString();
    const pill=document.createElement('div');
    pill.className='dpill'+(isActive?' active':'')+(isToday2?' is-today':'');
    const evts=eventsOn(d).slice(0,3);
    const dots=evts.map(e=>`<span class="dpip" style="background:${offColor(e.office)}"></span>`).join('');
    pill.innerHTML=`<div class="dpill-wd">${DS[d.getDay()]}</div><div class="dpill-num">${d.getDate()}</div><div class="dpill-dots">${dots}</div>`;
    pill.onclick=()=>{currentDate=new Date(d);renderAll();};
    strip.appendChild(pill);
  }
  strip.querySelector('.active')?.scrollIntoView({block:'nearest',inline:'center'});
}

function renderDateHero(){
  const evts=eventsOn(currentDate);
  document.getElementById('date-hero').innerHTML=`
    <div class="dh-wd">${DL[currentDate.getDay()]}</div>
    <div class="dh-day">${currentDate.getDate()}</div>
    <div class="dh-mo">${ML[currentDate.getMonth()]}</div>
    <div class="dh-yr">${currentDate.getFullYear()}</div>
    <div class="dh-div"></div>
    <div class="dh-n"><strong>${evts.length}</strong>${evts.length===1?'event':'events'}</div>`;
}

function renderEventScroll(){
  const evts=eventsOn(currentDate);
  const scroll=document.getElementById('event-scroll');
  if(!evts.length){
    let next=null;
    for(let i=1;i<400;i++){const d=new Date(currentDate);d.setDate(d.getDate()+i);if(hasDayEvt(d)){next=d;break;}}
    scroll.innerHTML=`<div class="empty"><div class="ei">📭</div><h3>No events on this day</h3><p>Navigate using the date strip above.<br>${next?`Next event: <strong>${MS[next.getMonth()]} ${next.getDate()}</strong>`:''}</p></div>`;
    return;
  }
  scroll.innerHTML=evts.map((ev,i)=>eventCardHTML(ev,i,'day')).join('');
}

function eventCardHTML(ev,i,ctx){
  const bc=offColor(ev.office),tc=typeColor(ev.type),tl=typeLabel(ev.type);
  return `<div class="ecard" onclick="openModal('${ctx}',${i})">
    <div class="ebar" style="background:${bc}"></div>
    <div class="ebody">
      <div class="etop">
        <div class="ename">${ev.name}</div>
        <span class="ebadge" style="background:${tc}18;color:${tc}">${tl}</span>
      </div>
      <div class="emeta">
        ${ev.location?`<span class="emi">📍 ${ev.location}</span>`:''}
        <span class="emi">🏢 <b style="color:${bc}">${ev.office||'—'}</b></span>
        ${ev.industry?`<span class="emi">🏷 ${ev.industry}</span>`:''}
      </div>
      <div class="efoot">
        ${ev.poc?`<span class="epoc">POC: ${ev.poc}</span>`:''}
        ${ev.topic?`<span class="etopic">"${ev.topic}"</span>`:''}
        <span class="emore">Details →</span>
      </div>
    </div>
  </div>`;
}

// ── MONTH VIEW ──
function renderMonth(){
  const y=currentDate.getFullYear(), m=currentDate.getMonth();
  document.getElementById('mv-title').textContent=ML[m]+' '+y;
  const monthEvts=datedFiltered().filter(e=>{const d=new Date(e.date+'T12:00:00');return d.getFullYear()===y&&d.getMonth()===m;});
  document.getElementById('mv-count').textContent=monthEvts.length+' events';

  // Build cells: keep existing header row (7 cells), then append day cells
  const grid=document.getElementById('mv-grid');
  // Remove all non-header cells
  const headers=Array.from(grid.querySelectorAll('.mv-head-cell'));
  grid.innerHTML='';
  headers.forEach(h=>grid.appendChild(h));

  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const daysInPrev=new Date(y,m,0).getDate();

  let cells=[];
  for(let i=firstDay-1;i>=0;i--) cells.push({day:daysInPrev-i,thisMonth:false});
  for(let d=1;d<=daysInMonth;d++) cells.push({day:d,thisMonth:true});
  while(cells.length%7!==0) cells.push({day:cells.length-firstDay-daysInMonth+1,thisMonth:false});

  cells.forEach(({day,thisMonth})=>{
    const cell=document.createElement('div');
    const cellDate=thisMonth?new Date(y,m,day):null;
    const isToday2=cellDate&&cellDate.toDateString()===realToday.toDateString();
    cell.className='mv-cell'+(thisMonth?'':' other-month')+(isToday2?' is-today':'');

    const numDiv=document.createElement('div');
    numDiv.className='mv-day-num';
    numDiv.textContent=day;
    cell.appendChild(numDiv);

    if(thisMonth){
      const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const dayEvts=datedFiltered().filter(e=>e.date===ds);
      const MAX=3;
      // Store events on cell for modal access
      cell._evts=dayEvts;

      dayEvts.slice(0,MAX).forEach((ev,i)=>{
        const chip=document.createElement('span');
        chip.className='mv-chip';
        const bc=offColor(ev.office);
        chip.style.background=bc;
        chip.textContent=ev.name;
        chip.title=ev.name;
        chip.onclick=(e)=>{e.stopPropagation();openMonthModal(ev);};
        cell.appendChild(chip);
      });
      if(dayEvts.length>MAX){
        const more=document.createElement('div');
        more.className='mv-more';
        more.textContent=`+${dayEvts.length-MAX} more`;
        more.onclick=(e)=>{e.stopPropagation();openDayPopover(day,y,m,dayEvts);};
        cell.appendChild(more);
      }
      // Click empty area → switch to day view for that date
      cell.onclick=()=>{
        currentDate=new Date(y,m,day);
        weekStart=mondayOf(new Date(currentDate));
        setView('day');
        renderAll();
      };
    }
    grid.appendChild(cell);
  });
}

function openMonthModal(ev){
  const bc=offColor(ev.office),tc=typeColor(ev.type),tl=typeLabel(ev.type);
  const isLink=ev.link&&ev.link.startsWith('http');
  document.getElementById('modal-inner').innerHTML=`
    <div class="mhead">
      <div class="mbar" style="background:${bc}"></div>
      <span class="mbadge-m" style="background:${tc}18;color:${tc}">${tl}</span>
      <div class="mtitle">${ev.name}</div>
      <button class="mx" onclick="closeModal()">×</button>
    </div>
    <div class="mbody">
      <div class="mgrid">
        <div class="mf"><label>Date</label><p>${ev.date?new Date(ev.date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):'TBD'}</p></div>
        <div class="mf"><label>Location</label><p>${ev.location||'—'}</p></div>
        <div class="mf"><label>Office / Region</label><p><span style="display:inline-flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:${bc};display:inline-block"></span>${ev.office||'—'}${ev.region?` · ${ev.region}`:''}</span></p></div>
        <div class="mf"><label>POC / Event Executive</label><p>${ev.poc||'—'}</p></div>
        ${ev.industry?`<div class="mf"><label>Industry</label><p>${ev.industry}</p></div>`:''}
        ${ev.sector?`<div class="mf"><label>Sector</label><p>${ev.sector}</p></div>`:''}
        ${ev.speakers?`<div class="mf full"><label>Research Speakers</label><p>${ev.speakers}</p></div>`:''}
        ${ev.status?`<div class="mf full"><label>Status</label><p>${ev.status}</p></div>`:''}
      </div>
      ${ev.topic?`<div class="mbox topic">💬 ${ev.topic}</div>`:''}
      ${ev.comments?`<div class="mbox comments">📝 ${ev.comments}</div>`:''}
      <div class="mtag-row">
        ${ev.top20==='Yes'||ev.top20==='yes'?'<span class="mtag green">⭐ Top 20</span>':''}
        ${ev.resPriority&&!isNaN(ev.resPriority)&&Number(ev.resPriority)>0?`<span class="mtag blue">Research Priority: ${ev.resPriority}/5</span>`:''}
      </div>
      ${isLink?`<br><a class="mlink" href="${ev.link}" target="_blank" rel="noopener">🔗 View Event / SF Link</a>`:''}
    </div>`;
  document.getElementById('overlay').classList.add('open');
}

// Popover for +N more — shows mini list then opens individual modals
function openDayPopover(day,y,m,evts){
  const dateStr=new Date(y,m,day).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
  document.getElementById('modal-inner').innerHTML=`
    <div class="mhead">
      <div class="mbar" style="background:var(--ming)"></div>
      <div class="mtitle" style="font-size:.95rem">${dateStr} — all events</div>
      <button class="mx" onclick="closeModal()">×</button>
    </div>
    <div class="mbody" style="padding:10px 14px">
      ${evts.map((ev,i)=>{
        const bc=offColor(ev.office),tc=typeColor(ev.type),tl=typeLabel(ev.type);
        return `<div class="ecard" style="margin-bottom:8px" onclick="closeModal();setTimeout(()=>openMonthModal(${JSON.stringify(ev).replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}),80)">

// Month nav prev/next
document.getElementById('mv-prev').onclick=()=>{
  currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()-1,1);
  renderMonthStrip();renderMonth();
};
document.getElementById('mv-next').onclick=()=>{
  currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()+1,1);
  renderMonthStrip();renderMonth();
};
function renderTbd(){
  const q=(document.getElementById('tbd-search')?.value||'').toLowerCase();
  let events=tbdFiltered();
  if(q)events=events.filter(e=>[e.name,e.location,e.office,e.industry,e.poc,e.sector].some(x=>(x||'').toLowerCase().includes(q)));
  document.getElementById('tbd-sub').textContent=`${events.length} events without confirmed dates`;
  const grid=document.getElementById('tbd-grid');
  if(!events.length){grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="ei">🔍</div><h3>No results</h3><p>Try a different search term.</p></div>`;return;}
  grid.innerHTML=events.map((ev,i)=>eventCardHTML(ev,i,'tbd')).join('');
}

// ── MODAL ──

    <div class="mhead">
      <div class="mbar" style="background:${bc}"></div>
      <span class="mbadge-m" style="background:${tc}18;color:${tc}">${tl}</span>
      <div class="mtitle">${ev.name}</div>
      <button class="mx" onclick="closeModal()">×</button>
    </div>
    <div class="mbody">
      <div class="mgrid">
        <div class="mf"><label>Date</label><p>${ev.date?new Date(ev.date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):'TBD — date not confirmed'}</p></div>
        <div class="mf"><label>Location</label><p>${ev.location||'—'}</p></div>
        <div class="mf"><label>Office / Region</label><p><span style="display:inline-flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:${bc};display:inline-block"></span>${ev.office||'—'}${ev.region?` · ${ev.region}`:''}</span></p></div>
        <div class="mf"><label>POC / Event Executive</label><p>${ev.poc||'—'}</p></div>
        ${ev.industry?`<div class="mf"><label>Industry</label><p>${ev.industry}</p></div>`:''}
        ${ev.sector?`<div class="mf"><label>Sector</label><p>${ev.sector}</p></div>`:''}
        ${ev.speakers?`<div class="mf full"><label>Research Speakers</label><p>${ev.speakers}</p></div>`:''}
        ${ev.status?`<div class="mf full"><label>Status</label><p>${ev.status}</p></div>`:''}
      </div>
      ${ev.topic?`<div class="mbox topic">💬 ${ev.topic}</div>`:''}
      ${ev.comments?`<div class="mbox comments">📝 ${ev.comments}</div>`:''}
      <div class="mtag-row">
        ${ev.top20==='Yes'||ev.top20==='yes'?'<span class="mtag green">⭐ Top 20</span>':''}
        ${ev.resPriority&&!isNaN(ev.resPriority)&&Number(ev.resPriority)>0?`<span class="mtag blue">Research Priority: ${ev.resPriority}/5</span>`:''}
      </div>
      ${isLink?`<br><a class="mlink" href="${ev.link}" target="_blank" rel="noopener">🔗 View Event / SF Link</a>`:''}
    </div>`;
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

// ── NAV ──
document.getElementById('prev-btn').onclick=()=>{weekStart.setDate(weekStart.getDate()-7);currentDate.setDate(currentDate.getDate()-7);renderAll();};
document.getElementById('next-btn').onclick=()=>{weekStart.setDate(weekStart.getDate()+7);currentDate.setDate(currentDate.getDate()+7);renderAll();};
document.getElementById('today-btn').onclick=()=>{currentDate=new Date(realToday);weekStart=mondayOf(new Date(realToday));if(currentView==='tbd')setView('day');renderAll();if(currentView==='month')renderMonth();};
document.addEventListener('keydown',e=>{
  if(document.getElementById('overlay').classList.contains('open')){if(e.key==='Escape')closeModal();return;}
  if(currentView!=='day')return;
  if(e.key==='ArrowRight'){currentDate.setDate(currentDate.getDate()+1);ensureInStrip();renderAll();}
  if(e.key==='ArrowLeft'){currentDate.setDate(currentDate.getDate()-1);ensureInStrip();renderAll();}
});
function ensureInStrip(){const end=new Date(weekStart);end.setDate(end.getDate()+13);if(currentDate<weekStart||currentDate>end)weekStart=mondayOf(new Date(currentDate));}

function renderAll(){
  renderMonthStrip();renderOfficeRow();renderStats();
  if(currentView==='day'){renderDayStrip();renderDateHero();renderEventScroll();}
  if(currentView==='month')renderMonth();
  if(currentView==='tbd')renderTbd();
}

// ── SHAREPOINT IFRAME HEIGHT FIX ──
// SP Embed web part sandboxes the iframe. body{position:fixed;inset:0} 
// fills whatever height SP gives the iframe. We also post a resize
// message so SP can expand the iframe to fill available space.
(function spResize(){
  function send(){
    try{
      window.parent.postMessage(JSON.stringify({
        type:'resize',height:document.documentElement.scrollHeight
      }),'*');
    }catch(e){}
  }
  send();
  window.addEventListener('resize',send);
  // Also try the SP-specific approach
  try{
    if(window.frameElement){
      window.frameElement.style.height='100%';
      window.frameElement.style.minHeight='600px';
    }
  }catch(e){}
})();
